name: Build and Release macOS App

on:
  pull_request:
    types:
      - closed
    paths:
      - 'src/**/*.py'  
      - 'requirements.txt' 
      - 'build_script.py' 
      - '.github/workflows/build.yaml' 
      - 'assets/**'

jobs:
  build-app:
    if: github.event.pull_request.merged == true
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build with PyInstaller
        run: python build_script.py

      - name: Create Professional DMG
        run: |
          # install create dmg tool
          brew install create-dmg
          
          # prepare the package structure
          mkdir -p dist/dmg_root
          # 将打包生成的 .app 移动到 dmg_root
          cp -r dist/S3Uploader.app dist/dmg_root/
          
          # 3. 创建带有背景引导图的专业 DMG
          # 坐标解释: S3Uploader图标(200, 190), 应用程序快捷方式(400, 190)
          create-dmg \
            --volname "S3Uploader Installer" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --background "assets/dmg_background.png" \
            --icon "S3Uploader.app" 200 190 \
            --app-drop-link 400 190 \
            --hide-extension "S3Uploader.app" \
            "S3Uploader.dmg" \
            "dist/dmg_root/"

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: build-${{ github.sha }}
          name: Release ${{ github.sha }}
          files: S3Uploader.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}