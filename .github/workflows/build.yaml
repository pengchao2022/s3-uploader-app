name: Build and Release macOS App

on:
  
  push:
    branches:
      - 'release/*'
      - 'main'
      - 'develop'

    paths:
      - 'src/**'
      - 'main.py'
      - 'build_script.py'
      - 'requirements.txt'
      - '.github/workflows/build.yaml'
      - 'assets/**'

jobs:
  build-app:
    if: github.event.pull_request.merged == true
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Extract Version
        id: get_version
        run: |
          # 使用 grep 和 sed 从 pyproject.toml 提取版本号
          VERSION=$(grep -m 1 'version' pyproject.toml | sed -E 's/.*"([^"]+)".*/\1/')
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Extracted version: $VERSION"

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build with PyInstaller
        run: python build_script.py --version ${{ env.VERSION }}

      - name: Create Professional DMG
        run: |
          # install create dmg tool
          brew install create-dmg
          
          # prepare the package structure
          mkdir -p dist/dmg_root
          # 将打包生成的 .app 移动到 dmg_root
          cp -r dist/S3Uploader.app dist/dmg_root/
          
          # 3. 创建带有背景引导图的专业 DMG
          # 坐标解释: S3Uploader图标(200, 190), 应用程序快捷方式(400, 190)
          create-dmg \
            --volname "S3Uploader Installer" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --background "assets/dmg_background.png" \
            --icon "S3Uploader.app" 200 190 \
            --app-drop-link 400 190 \
            --hide-extension "S3Uploader.app" \
            "S3Uploader-${{ env.VERSION }}.dmg" \
            "dist/dmg_root/"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: S3Uploader-dev
          path: S3Uploader-${{ env.VERSION }}.dmg

      - name: Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ env.VERSION }}
          # title also with version
          name: "Release v${{ env.VERSION }}"
          files: S3Uploader-${{ env.VERSION }}.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}